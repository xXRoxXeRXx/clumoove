version: '3.8'

networks:
  migration-network:
    driver: bridge

services:
  # Persistent Database
  postgres-db:
    image: postgres:15-alpine
    container_name: migration-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: cloud_migration_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: ["postgres", "-c", "max_connections=300"]
    networks:
      - migration-network

  # Message Broker & Queue
  redis-queue:
    image: redis:7-alpine
    container_name: migration-redis
    restart: always
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}" --bind 0.0.0.0
    volumes:
      - redis_data:/data
    networks:
      - migration-network

  # Go API Gateway & Backend Control (Production Binary)
  api-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: migration-api
    restart: always
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-db:5432/cloud_migration_db?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379
      - ENCRYPTION_SECRET_KEY=${ENCRYPTION_SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ALLOWED_ORIGIN=${CORS_ALLOWED_ORIGIN}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_DISPLAY_NAME=${ADMIN_DISPLAY_NAME}
      - PORT=8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DROPBOX_CLIENT_ID=${DROPBOX_CLIENT_ID}
      - DROPBOX_CLIENT_SECRET=${DROPBOX_CLIENT_SECRET}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Clumove}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION:-starttls}
    depends_on:
      - postgres-db
      - redis-queue
    networks:
      - migration-network

  # Core Migration Engine Worker (Production Binary)
  migration-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: migration-worker-1
    restart: always
    command: ["/app/worker"]
    environment:
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres-db:5432/cloud_migration_db?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379
      - ENCRYPTION_SECRET_KEY=${ENCRYPTION_SECRET_KEY}
      - MAX_THREADS=${MAX_THREADS:-50}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DROPBOX_CLIENT_ID=${DROPBOX_CLIENT_ID}
      - DROPBOX_CLIENT_SECRET=${DROPBOX_CLIENT_SECRET}
    depends_on:
      - postgres-db
      - redis-queue
    networks:
      - migration-network

  # Web-Frontend (Production Nginx serving static files)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    container_name: migration-frontend
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - api-backend
    networks:
      - migration-network

volumes:
  postgres_data:
  redis_data:
