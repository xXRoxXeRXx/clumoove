server {
    listen 3000;
    server_name localhost;

    # Security headers for the SPA documents (M-2). The /api/ mux applies its
    # own stricter set; these protect the HTML/asset responses served here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    # X-XSS-Protection is deprecated and can introduce vulnerabilities in legacy
    # browsers; real protection comes from the CSP above. Disable it explicitly.
    add_header X-XSS-Protection "0" always;
    # The Google Photos Picker widget loads its loader/JS from Google CDNs,
    # renders inside a Google-hosted iframe, and talks to Google APIs, so those
    # origins are whitelisted across script-src/frame-src/connect-src/img-src.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://*.googleusercontent.com https://*.gstatic.com https://*.google.com; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.gstatic.com https://apis.google.com https://*.google.com; frame-src https://*.google.com https://content.googleapis.com https://docs.google.com https://photos.google.com; connect-src 'self' https://*.googleapis.com https://*.google.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;
    # The Picker opens/manages an auth popup and polls window.closed; COOP
    # 'same-origin' would sever that reference. 'same-origin-allow-popups'
    # keeps cross-origin isolation for the document while permitting popups
    # we open to remain referenceable.
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
