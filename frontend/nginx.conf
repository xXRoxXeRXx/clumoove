server {
    listen 3000;
    server_name localhost;

    # Security headers for the SPA documents (M-2). The /api/ mux applies its
    # own stricter set; these protect the HTML/asset responses served here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    # X-XSS-Protection is deprecated and can introduce vulnerabilities in legacy
    # browsers; real protection comes from the CSP above. Disable it explicitly.
    add_header X-XSS-Protection "0" always;
    # The Google Photos Picker API has no embeddable widget: the pickerUri is
    # opened in a NEW TAB (its own Google-origin page, not governed by this
    # CSP), and selection status is polled via our own backend. So the strict
    # 'self'-only CSP is sufficient again — no Google origins need whitelisting.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;
    # window.open() for the picker tab requires popups to remain referenceable.
    # 'same-origin-allow-popups' keeps document isolation while allowing popups
    # we open (avoids the "Cross-Origin-Opener-Policy would block window.closed"
    # warning when interacting with the opened picker tab).
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
